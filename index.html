<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Eagle Store - Silent Installer</title>
    <style>
        body { 
            background: #000; color: #e67e22; 
            text-align: center; padding-top: 100px; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
        }
        .loader {
            border: 4px solid #111; border-top: 4px solid #e67e22;
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h1>Eagle Store Cloud 🦅</h1>
    <div class="loader"></div>
    <p id="status">جاري بدء التحميل في الخلفية... انتظر ثانية</p>

    <script>
        // رابط الملف المباشر الذي استخرجناه من Gofile
        const PKG_URL = "https://store5.gofile.io/download/web/da31f27e-a5e7-468b-b874-e5e086bf7d03/Store-R2.pkg";

        async function forceInstall() {
            // قائمة المنافذ التي تفتحها ثغرة LuaCore أو Remote Installer
            const ports = [12800, 9021, 9026];
            let launched = false;

            for (let port of ports) {
                try {
                    // نرسل الطلب لـ IP الجهاز نفسه (127.0.0.1) لأن المتصفح شغال داخل السوني
                    await fetch(`http://127.0.0.1:${port}/api/install`, {
                        method: 'POST',
                        body: JSON.stringify({
                            type: "direct",
                            packages: [PKG_URL]
                        })
                    });
                    launched = true;
                } catch (e) {
                    console.log("Port " + port + " is closed.");
                }
            }

            if (launched) {
                document.getElementById('status').innerHTML = "✅ بدأ التحميل! افحص 'التنبيهات' في السوني الآن.";
                document.getElementById('status').style.color = "#2ecc71";
            } else {
                document.getElementById('status').innerHTML = "❌ فشل الإرسال الإجباري. تأكد من تشغيل البايلود في السوني أولاً.";
                document.getElementById('status').style.color = "#e74c3c";
            }
        }

        // تنفيذ الأمر فور فتح الصفحة تلقائياً
        window.onload = forceInstall;
    </script>
</body>
</html>
