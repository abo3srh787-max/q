<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Eagle Store - Auto Installer</title>
    <style>
        body { 
            background: #000; 
            color: #e67e22; 
            text-align: center; 
            padding-top: 100px; 
            font-family: Arial, sans-serif; 
        }
        .loading-text { font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Eagle Store 🦅</h1>
    <div class="loading-text" id="status">جاري بدء التحميل التلقائي...</div>

    <script>
        // رابط ملفك المباشر من Gofile
        const PKG_URL = "https://store5.gofile.io/download/web/da31f27e-a5e7-468b-b874-e5e086bf7d03/Store-R2.pkg";

        function startForcedDownload() {
            // الطريقة الأولى: الإجبار عبر الـ Location (الأسرع)
            window.location.href = PKG_URL;

            // الطريقة الثانية احتياطياً: الحقن عبر API السوني (لو البايلود شغال)
            const ports = [12800, 9021, 9026];
            ports.forEach(port => {
                fetch(`http://127.0.0.1:${port}/api/install`, {
                    method: 'POST',
                    body: JSON.stringify({ type: "direct", packages: [PKG_URL] })
                }).catch(e => console.log("Port closed"));
            });

            setTimeout(() => {
                document.getElementById('status').innerHTML = "✅ إذا لم يبدأ التحميل، تأكد أنك تستخدم متصفح السوني الرسمي.";
            }, 3000);
        }

        // تشغيل الإجبار فوراً عند فتح الصفحة
        window.onload = startForcedDownload;
    </script>
</body>
</html>
