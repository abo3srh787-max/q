<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Eagle Store - Official Support</title>
    <style>
        body { 
            background: #050505; color: #e67e22; 
            text-align: center; padding-top: 150px; 
            font-family: 'Arial', sans-serif; 
        }
        .btn-download {
            padding: 20px 40px; background: #e67e22;
            color: white; border-radius: 50px;
            text-decoration: none; font-weight: bold;
            display: inline-block; margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Eagle Store 🦅</h1>
    <p id="status">جاري تحضير الملف للتحميل الإجباري...</p>

    <script>
        // رابط قوفايل المباشر
        const PKG_URL = "https://store5.gofile.io/download/web/da31f27e-a5e7-468b-b874-e5e086bf7d03/Store-R2.pkg";

        function forceDownload() {
            // محاكاة ضغط رابط مخفي لإجبار المتصفح على الاستجابة
            var link = document.createElement('a');
            link.href = PKG_URL;
            link.download = "Store-R2.pkg"; // محاولة إجبار النظام على اعتباره ملف تحميل
            link.target = "_self";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            document.getElementById('status').innerText = "✅ بدأت محاولة التحميل. إذا ظهر لك خطأ، فالنظام الرسمي يمنع هذا النوع من الملفات.";
        }

        // تشغيل المحاولة فوراً عند الدخول
        window.onload = function() {
            setTimeout(forceDownload, 1000);
        };
    </script>
</body>
</html>
